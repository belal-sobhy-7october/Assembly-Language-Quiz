<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assembly Language Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ebe0;
    --bg-card: #e8e2d4;
    --text: #3b2f20;
    --text-muted: #7a6b58;
    --green: #4a7c59;
    --green-light: #e8f0e6;
    --brown: #8b6f47;
    --brown-light: #c9b89a;
    --border: #ccc4b0;
    --surface: #e8e2d4;
    --surface2: #dfd8c8;
    --font-main: 'Source Serif 4', serif;
    --font-mono: 'DM Mono', monospace;
  }

  [data-theme="dark"] {
    --bg: #0f1117;
    --bg-card: #1a1d27;
    --surface: #1a1d27;
    --surface2: #222636;
    --border: #2a2f45;
    --text: #e8e2d9;
    --text-muted: #8a8070;
    --green: #5a9a6e;
    --green-light: rgba(90,154,110,0.12);
    --brown: #b8966a;
    --brown-light: #7a6050;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s, border-color 0.3s; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    padding: 40px 24px 0;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .header-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--green);
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 4px 14px;
    border: 1px solid rgba(74,124,89,0.4);
    border-radius: 2px;
    margin-bottom: 16px;
  }

  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 999;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #e8e2d4;
    border: 2px solid #ccc4b0;
    color: #4a7c59;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    line-height: 1;
  }

  [data-theme="dark"] .theme-toggle {
    background: #2a2f45;
    border-color: #3a4060;
    color: #f0c060;
  }

  header h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    color: var(--text);
    margin-bottom: 8px;
  }

  header p {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 24px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-top: 24px;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-main);
    font-size: 14px;
    font-weight: 600;
    padding: 14px 32px;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
    letter-spacing: 0.5px;
  }

  .tab-btn.active {
    color: var(--green);
  }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--green);
  }

  .tab-btn:hover { color: var(--text); }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── MAIN CONTENT ── */
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 24px 120px;
    position: relative;
    z-index: 5;
  }

  .section-panel { display: none; }
  .section-panel.active { display: block; }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--border);
    transition: background 0.2s;
  }

  .q-card.answered::before { background: var(--green); }
  .q-card.correct::before { background: #27ae60; }
  .q-card.wrong::before { background: #c0392b; }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
  }

  .q-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--green);
    background: var(--green-light);
    border: 1px solid rgba(74,124,89,0.3);
    border-radius: 4px;
    padding: 3px 8px;
    white-space: nowrap;
    margin-top: 2px;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    font-weight: 400;
  }

  /* ── MCQ OPTIONS ── */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }

  @media (max-width: 560px) {
    .options { grid-template-columns: 1fr; }
  }

  .opt-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 13px;
    padding: 10px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: rgba(74,124,89,0.3);
    background: var(--green-light);
  }

  .opt-btn.selected {
    border-color: var(--green);
    background: var(--green-light);
    color: var(--green);
  }

  .opt-btn.show-correct {
    border-color: var(--green);
    background: var(--green-light);
    color: var(--green);
  }

  .opt-btn.show-wrong {
    border-color: #c0392b;
    background: rgba(192,57,43,0.08);
    color: #c0392b;
  }

  .opt-letter {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    min-width: 18px;
  }

  .opt-btn.selected .opt-letter { color: var(--green); }
  .opt-btn.show-correct .opt-letter { color: var(--green); }
  .opt-btn.show-wrong .opt-letter { color: #c0392b; }

  /* ── T/F BUTTONS ── */
  .tf-btns {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .tf-btn {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-family: var(--font-main);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .tf-btn.true-btn { color: var(--green); }
  .tf-btn.false-btn { color: #c0392b; }

  .tf-btn:hover:not(:disabled) { border-color: var(--brown-light); }

  .tf-btn.true-btn.selected {
    background: var(--green-light);
    border-color: var(--green);
  }

  .tf-btn.false-btn.selected {
    background: rgba(192,57,43,0.08);
    border-color: #c0392b;
  }

  .tf-btn.show-correct {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
  }

  .tf-btn.show-wrong {
    background: rgba(192,57,43,0.08);
    border-color: #c0392b;
    color: #c0392b;
  }

  /* ── RESULT BADGE ── */
  .result-badge {
    display: none;
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 4px;
    border-left: 3px solid;
  }

  .result-badge.correct {
    display: block;
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
  }

  .result-badge.wrong {
    display: block;
    background: rgba(192,57,43,0.08);
    border-color: #c0392b;
    color: #c0392b;
  }

  /* ── SUBMIT BUTTON ── */
  .submit-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 30;
    padding: 16px 24px;
    background: linear-gradient(0deg, var(--bg) 60%, transparent);
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .submit-btn {
    background: var(--green);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: var(--font-main);
    font-size: 15px;
    font-weight: 700;
    padding: 14px 48px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(59,47,32,0.06);
  }

  .submit-btn:hover { background: #3d6a4a; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }

  .reset-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-family: var(--font-main);
    font-size: 15px;
    font-weight: 600;
    padding: 14px 24px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: var(--green); color: var(--text); }

  /* ── SCORE MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(59,47,32,0.3);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    max-width: 460px;
    width: 100%;
    text-align: center;
    position: relative;
    animation: popIn 0.3s ease;
    box-shadow: 0 4px 16px rgba(59,47,32,0.06);
  }

  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal-icon {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
  }

  .modal h2 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
    color: var(--text);
  }

  .score-big {
    font-family: var(--font-mono);
    font-size: 52px;
    font-weight: 700;
    color: var(--green);
    display: block;
    margin: 16px 0 8px;
  }

  .score-details {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin: 24px 0;
  }

  .score-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 8px;
  }

  .score-item .val {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    display: block;
    margin-bottom: 4px;
  }

  .score-item .lbl {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .score-item.s-correct .val { color: var(--green); }
  .score-item.s-wrong .val { color: #c0392b; }
  .score-item.s-skip .val { color: var(--text-muted); }

  .grade-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 16px 0;
  }

  .grade-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s ease;
  }

  .modal-close {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 14px;
    font-weight: 600;
    padding: 12px 32px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    width: 100%;
  }

  .modal-close:hover { border-color: var(--green); color: var(--green); }

  /* ── SECTION HEADING ── */
  .section-title {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--green);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .q-count-badge {
    background: var(--green-light);
    border: 1px solid rgba(74,124,89,0.3);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 11px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--brown-light); border-radius: 3px; }

  #timer-display {
    padding: 6px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-family: var(--font-mono);
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text);
    display: block;
    text-align: center;
    width: fit-content;
    margin: 10px auto;
  }

  #timer-display.timer-pulse {
    animation: timer-pulse 1s ease-in-out infinite;
  }

  @keyframes timer-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>

<header>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="themeIcon">☀</span>
  </button>
  <h1>Assembly Language Quiz</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('mcq')">MCQ &nbsp;<span id="mcq-tab-count" style="font-family:var(--font-mono);font-size:11px;color:var(--muted)"></span></button>
    <button class="tab-btn" onclick="switchTab('tf')">True / False &nbsp;<span id="tf-tab-count" style="font-family:var(--font-mono);font-size:11px;color:var(--muted)"></span></button>
  </div>
</header>

<div id="timer-display">60:00</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-text" id="prog-text">0 / 0</div>
</div>

<main>
  <div class="section-panel active" id="panel-mcq">
    <div class="section-title">
      Multiple Choice Questions
      <span class="q-count-badge" id="mcq-count-label"></span>
    </div>
    <div id="mcq-container"></div>
  </div>

  <div class="section-panel" id="panel-tf">
    <div class="section-title">
      True / False
      <span class="q-count-badge" id="tf-count-label"></span>
    </div>
    <div id="tf-container"></div>
  </div>
</main>

<div class="submit-wrap">
  <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
  <button class="submit-btn" onclick="submitAll()">Submit ↗</button>
</div>

<!-- Score Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <span class="modal-icon" id="modal-icon">🎯</span>
    <h2 id="modal-title">النتيجة</h2>
    <span class="score-big" id="modal-pct">0%</span>
    <div class="grade-bar"><div class="grade-fill" id="modal-bar" style="width:0%"></div></div>
    <div class="score-details">
      <div class="score-item s-correct">
        <span class="val" id="m-correct">0</span>
        <span class="lbl">Correct</span>
      </div>
      <div class="score-item s-wrong">
        <span class="val" id="m-wrong">0</span>
        <span class="lbl">Wrong</span>
      </div>
      <div class="score-item s-skip">
        <span class="val" id="m-skip">0</span>
        <span class="lbl">Skipped</span>
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()">شوف التصحيح</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════

const MCQ_DATA = [
  { q: "… is a type of computer program that interprets software programs written in assembly language into machine language", opts: ["operating system","assembler","Object-oriented","none of the previous"], ans: 1 },
  { q: "Assembly language is considered a ……… programming language", opts: ["High-level","Low-level","Object-oriented","Scripting"], ans: 1 },
  { q: "The main purpose of an assembler in Assembly language programming", opts: ["To execute the program","To convert assembly code to machine code","To provide a user-friendly interface","To allocate memory for variables"], ans: 1 },
  { q: "… step is responsible for translating assembly code into binary", opts: ["Execution","Linking","Assembling","Loading"], ans: 2 },
  { q: "… step is responsible for joining all the parts together and resolve names", opts: ["Execution","Linking","Assembling","Loading"], ans: 1 },
  { q: "… step is responsible for run the program", opts: ["Execution","Linking","Assembling","Loading"], ans: 0 },
  { q: "Each assembly language instruction corresponds to .... machine language instruction", opts: ["one","two","three","a or b"], ans: 0 },
  { q: "….bus responsible for moves data", opts: ["address","control","data","a and b"], ans: 2 },
  { q: "… is used to trigger events", opts: ["ALU","CU","control bus","clock"], ans: 3 },
  { q: "Which part of the CPU is often manipulated directly in Assembly language?", opts: ["RAM","Cache","ALU (Arithmetic Logic Unit)","GPU"], ans: 2 },
  { q: "… is 32-bit register", opts: ["EBX","CX","DX","AL"], ans: 0 },
  { q: "… is a 16 bit register", opts: ["EBX","BH","DX","AL"], ans: 2 },
  { q: "… is a special register", opts: ["EAX","EBX","BX","EIP"], ans: 3 },
  { q: "… points to memory locations (Stack Based Pointer)", opts: ["EAX","EBX","EBP","EIP"], ans: 2 },
  { q: "…accumulates results from mathematical calculations", opts: ["AX","BX","CX","IP"], ans: 0 },
  { q: "… loop counter register", opts: ["EAX","EBX","ECX","EIP"], ans: 2 },
  { q: "… used in calculations", opts: ["EAX","EBX","ECX","EDX"], ans: 3 },
  { q: "… stack pointer register", opts: ["EDI","ESI","EBP","ESP"], ans: 3 },
  { q: "… stack based pointer register", opts: ["EDI","ESI","EBP","ESP"], ans: 2 },
  { q: "When no radix is specified for an integer constant, it is assumed to be..", opts: ["binary","hexadecimal","decimal","octal"], ans: 2 },
  { q: "0101b is … integer", opts: ["binary","hexadecimal","decimal","octal"], ans: 0 },
  { q: "0101h is … integer", opts: ["binary","hexadecimal","decimal","octal"], ans: 1 },
  { q: "Which symbol is used to represent a hexadecimal number", opts: ["b","d","h","q"], ans: 2 },
  { q: "Which of the following is a valid identifier", opts: ["1Var","Var1","MOV","add"], ans: 1 },
  { q: "Which of the following cannot be an identifier", opts: ["Count1","$total","MOV","my_var"], ans: 2 },
  { q: "Which of the following is a label", opts: ["label","Count:","MOV","add"], ans: 1 },
  { q: "…. is used to define variables in an assembly program", opts: [".code",".data",".stack",".end"], ans: 1 },
  { q: "The .code directive ….", opts: ["Defines the area for program instructions","Marks the end of the program","Allocates memory for the runtime stack","Defines global constants"], ans: 0 },
  { q: "What is the purpose of a label in Assembly Language?", opts: ["Stores numeric values","Marks the address of data or code","Defines a string constant","Executes a jump instruction"], ans: 1 },
  { q: ".. instruction is used to jump to a different part of a program", opts: ["ADD","JMP","MOV","INC"], ans: 1 },
  { q: "… instruction is used for performing a multiplication operation", opts: ["MUL","DIV","MOV","CMP"], ans: 0 },
  { q: "…. instruction is used for setting Carry flag", opts: ["stc","clc","inc","mov"], ans: 0 },
  { q: "Which of the following instruction defines a 32-bit unsigned integer", opts: ["value DWORD ?","value word?","value byte 2","value byte 32"], ans: 0 },
  { q: "…. calculate the size of myString BYTE \"This is a long string, containing\"", opts: ["($ - myString)","($ - myString) / 2","($ - myString) / 3","myString / 2"], ans: 0 },
  { q: "…. calculate the size of list2 WORD 1000h,2000h,3000h,4000h", opts: ["($ - list2)","($ - list2) / 2","($ - list2) / 3","list2 / 2"], ans: 1 },
  { q: '"add eax, var1" means', opts: ["var1 = eax + var1","eax = eax + var1","ebx = eax + var1","none of the previous"], ans: 1 },
  { q: '"imul eax, ebx, var" means', opts: ["eax = eax * ebx * var","var = eax * ebx","eax = ebx * var","none of the previous"], ans: 2 },
  { q: '"inc eax" means', opts: ["eax = eax + 1","eax = eax - 1","eax = eax","none of the previous"], ans: 0 },
  { q: "Which one of the following is valid statement", opts: ["xchg ax, bx","xchg var1, var2","xchg ax, 5","xchg eax, bx"], ans: 0 },
  { q: "Which one of the following is invalid statement", opts: ["add ax, bx","add var1, var2","add ax, 5","add eax, var1"], ans: 1 },
  { q: '"neg valW" means', opts: ["eax = -valW","valW = -eax","valW = -valW","none of the previous"], ans: 2 },

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════

let mcqOrder = [], tfOrder = [];
let mcqAnswers = {}, tfAnswers = {};
let submitted = false;
let currentTab = 'mcq';
const QUIZ_DURATION = 60 * 60;
let timerStarted = false;
let intervalId = null;
let timeLeft = QUIZ_DURATION;

function startTimer() {
  timeLeft = QUIZ_DURATION;
  const display = document.getElementById('timer-display');
  intervalId = setInterval(() => {
    timeLeft--;
    const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
    const s = String(timeLeft % 60).padStart(2, '0');
    display.textContent = m + ':' + s;
    if (timeLeft <= 60) display.classList.add('timer-pulse');
    else display.classList.remove('timer-pulse');
    if (timeLeft <= 300) { display.style.color = '#c0392b'; display.style.borderColor = '#c0392b'; display.style.fontWeight = 'bold'; }
    else { display.style.color = ''; display.style.borderColor = ''; display.style.fontWeight = ''; }
    if (timeLeft <= 0) { clearInterval(intervalId); submitAll(); }
  }, 1000);
}

// ══════════════════════════════════════════════
//  SHUFFLE
// ══════════════════════════════════════════════

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ══════════════════════════════════════════════
//  RENDER MCQ
// ══════════════════════════════════════════════

function renderMCQ() {
  const container = document.getElementById('mcq-container');
  container.innerHTML = '';
  mcqOrder = shuffle(MCQ_DATA.map((_, i) => i));

  mcqOrder.forEach((dataIdx, displayIdx) => {
    const item = MCQ_DATA[dataIdx];
    const shuffledOpts = shuffle(item.opts.map((o, i) => ({ text: o, origIdx: i })));
    const correctDisplayIdx = shuffledOpts.findIndex(o => o.origIdx === item.ans);

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `mcq-card-${displayIdx}`;

    const letters = ['a','b','c','d'];
    let optsHtml = shuffledOpts.map((opt, i) => `
      <button class="opt-btn" onclick="selectMCQ(${displayIdx}, ${i}, ${correctDisplayIdx}, this.closest('.q-card'))"
        data-idx="${i}" data-correct="${i === correctDisplayIdx}">
        <span class="opt-letter">${letters[i]})</span>
        <span>${opt.text}</span>
      </button>
    `).join('');

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${displayIdx + 1}</span>
        <span class="q-text">${item.q.replace(/\n/g, '<br>')}</span>
      </div>
      <div class="options">${optsHtml}</div>
      <div class="result-badge" id="mcq-badge-${displayIdx}"></div>
    `;

    container.appendChild(card);
  });

  document.getElementById('mcq-count-label').textContent = `${MCQ_DATA.length} questions`;
  document.getElementById('mcq-tab-count').textContent = `(${MCQ_DATA.length})`;
  updateProgress();
}

function selectMCQ(displayIdx, optIdx, correctIdx, card) {
  if (!timerStarted) { timerStarted = true; startTimer(); }
  if (submitted) return;
  mcqAnswers[displayIdx] = { chosen: optIdx, correct: correctIdx };
  card.classList.add('answered');
  card.querySelectorAll('.opt-btn').forEach((btn, i) => {
    btn.classList.remove('selected');
    if (i === optIdx) btn.classList.add('selected');
  });
  updateProgress();
}

// ══════════════════════════════════════════════
//  RENDER T/F
// ══════════════════════════════════════════════

function renderTF() {
  const container = document.getElementById('tf-container');
  container.innerHTML = '';
  tfOrder = shuffle(TF_DATA.map((_, i) => i));

  tfOrder.forEach((dataIdx, displayIdx) => {
    const item = TF_DATA[dataIdx];

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `tf-card-${displayIdx}`;

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${displayIdx + 1}</span>
        <span class="q-text">${item.q}</span>
      </div>
      <div class="tf-btns">
        <button class="tf-btn true-btn" onclick="selectTF(${displayIdx}, true, ${item.ans}, this.closest('.q-card'))">TRUE</button>
        <button class="tf-btn false-btn" onclick="selectTF(${displayIdx}, false, ${item.ans}, this.closest('.q-card'))">FALSE</button>
      </div>
      <div class="result-badge" id="tf-badge-${displayIdx}"></div>
    `;

    container.appendChild(card);
  });

  document.getElementById('tf-count-label').textContent = `${TF_DATA.length} questions`;
  document.getElementById('tf-tab-count').textContent = `(${TF_DATA.length})`;
  updateProgress();
}

function selectTF(displayIdx, chosen, correct, card) {
  if (!timerStarted) { timerStarted = true; startTimer(); }
  if (submitted) return;
  tfAnswers[displayIdx] = { chosen, correct };
  card.classList.add('answered');
  const btns = card.querySelectorAll('.tf-btn');
  btns[0].classList.toggle('selected', chosen === true);
  btns[1].classList.toggle('selected', chosen === false);
  updateProgress();
}

// ══════════════════════════════════════════════
//  PROGRESS
// ══════════════════════════════════════════════

function updateProgress() {
  const total = MCQ_DATA.length + TF_DATA.length;
  const done = Object.keys(mcqAnswers).length + Object.keys(tfAnswers).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${done} / ${total}`;
}

// ══════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'mcq') || (i === 1 && tab === 'tf'));
  });
  document.getElementById('panel-mcq').classList.toggle('active', tab === 'mcq');
  document.getElementById('panel-tf').classList.toggle('active', tab === 'tf');
}

// ══════════════════════════════════════════════
//  SUBMIT
// ══════════════════════════════════════════════

function submitAll() {
  clearInterval(intervalId);
  submitted = true;

  let correct = 0, wrong = 0, skip = 0;
  const total = MCQ_DATA.length + TF_DATA.length;

  // Grade MCQ
  mcqOrder.forEach((_, displayIdx) => {
    const card = document.getElementById(`mcq-card-${displayIdx}`);
    const badge = document.getElementById(`mcq-badge-${displayIdx}`);
    const btns = card.querySelectorAll('.opt-btn');
    btns.forEach(b => b.disabled = true);

    if (mcqAnswers[displayIdx] === undefined) {
      skip++;
      const correctBtn = [...btns].find(b => b.dataset.correct === 'true');
      if (correctBtn) correctBtn.classList.add('show-correct');
      badge.className = 'result-badge wrong';
      badge.textContent = '⚠ Not answered — correct answer highlighted in green';
      card.classList.add('wrong');
    } else {
      const { chosen, correct: corr } = mcqAnswers[displayIdx];
      if (chosen === corr) {
        correct++;
        card.classList.remove('answered'); card.classList.add('correct');
        btns[chosen].classList.remove('selected'); btns[chosen].classList.add('show-correct');
        badge.className = 'result-badge correct';
        badge.textContent = '✓ Correct!';
      } else {
        wrong++;
        card.classList.remove('answered'); card.classList.add('wrong');
        btns[chosen].classList.remove('selected'); btns[chosen].classList.add('show-wrong');
        btns[corr].classList.add('show-correct');
        badge.className = 'result-badge wrong';
        badge.textContent = '✗ Wrong — correct answer highlighted in green';
      }
    }
  });

  // Grade T/F
  tfOrder.forEach((_, displayIdx) => {
    const card = document.getElementById(`tf-card-${displayIdx}`);
    const badge = document.getElementById(`tf-badge-${displayIdx}`);
    const btns = card.querySelectorAll('.tf-btn');
    btns.forEach(b => b.disabled = true);

    if (tfAnswers[displayIdx] === undefined) {
      skip++;
      const corr = TF_DATA[tfOrder[displayIdx]].ans;
      const corrBtn = corr ? btns[0] : btns[1];
      corrBtn.classList.add('show-correct');
      badge.className = 'result-badge wrong';
      badge.textContent = `⚠ Not answered — correct answer is ${corr ? 'TRUE' : 'FALSE'}`;
      card.classList.add('wrong');
    } else {
      const { chosen, correct: corr } = tfAnswers[displayIdx];
      const isCorrect = chosen === corr;
      if (isCorrect) {
        correct++;
        card.classList.remove('answered'); card.classList.add('correct');
        const btn = chosen ? btns[0] : btns[1];
        btn.classList.remove('selected'); btn.classList.add('show-correct');
        badge.className = 'result-badge correct';
        badge.textContent = '✓ Correct!';
      } else {
        wrong++;
        card.classList.remove('answered'); card.classList.add('wrong');
        const chosenBtn = chosen ? btns[0] : btns[1];
        const corrBtn = corr ? btns[0] : btns[1];
        chosenBtn.classList.remove('selected'); chosenBtn.classList.add('show-wrong');
        corrBtn.classList.add('show-correct');
        badge.className = 'result-badge wrong';
        badge.textContent = `✗ Wrong — correct answer is ${corr ? 'TRUE' : 'FALSE'}`;
      }
    }
  });

  // Show modal
  const pct = Math.round((correct / total) * 100);
  document.getElementById('modal-pct').textContent = pct + '%';
  document.getElementById('m-correct').textContent = correct;
  document.getElementById('m-wrong').textContent = wrong;
  document.getElementById('m-skip').textContent = skip;

  const bar = document.getElementById('modal-bar');
  bar.style.background = pct >= 70 ? 'linear-gradient(90deg, #10b981, #34d399)' :
                          pct >= 50 ? 'linear-gradient(90deg, #f59e0b, #fbbf24)' :
                                      'linear-gradient(90deg, #ef4444, #f87171)';
  setTimeout(() => { bar.style.width = pct + '%'; }, 100);

  document.getElementById('modal-icon').textContent = pct >= 80 ? '🏆' : pct >= 60 ? '🎯' : '📚';
  document.getElementById('modal-title').textContent = pct >= 80 ? 'ممتاز!' : pct >= 60 ? 'كويس!' : 'تحتاج مراجعة';

  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

// ══════════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════════

function resetAll() {
  clearInterval(intervalId);
  timerStarted = false;
  timeLeft = QUIZ_DURATION;
  document.getElementById('timer-display').textContent = '60:00';
  submitted = false;
  mcqAnswers = {};
  tfAnswers = {};
  renderMCQ();
  renderTF();
  switchTab('mcq');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════

renderMCQ();
renderTF();
</script>

<script>
(function() {
  var key = 'quiz-theme';
  var html = document.documentElement;
  var icon = document.getElementById('themeIcon');

  function setTheme(theme) {
    html.setAttribute('data-theme', theme);
    icon.textContent = theme === 'dark' ? '\u263E' : '\u2600';
    localStorage.setItem(key, theme);
  }

  var saved = localStorage.getItem(key);
  if (saved === 'dark') setTheme('dark');

  window.toggleTheme = function() {
    var cur = html.getAttribute('data-theme') || 'light';
    setTheme(cur === 'dark' ? 'light' : 'dark');
  };
})();
</script>
